name: Attach single-file build to release

# When a release is published, build the self-contained dinv_single.xml from
# the released commit and attach it to that release as a download. The artifact
# is never committed to the repo (see .gitignore); it is produced here on demand.

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-single-file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Build the exact commit the release points at, not floating master.
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Build dinv_single.xml
        run: python build.py

      - name: Attach dinv_single.xml (and dinv.manifest) to the release
        # dinv.manifest is uploaded too so single-file installs can check the
        # latest released version via .../releases/latest/download/dinv.manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" dinv_single.xml dinv.manifest --clobber
